<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <img src="Field-of-flowers.png" alt="Background Image">
        <section class="time-container">
            <section class="clock">
                <div id="hours"> <span class="label">HOURS</span></div>
                <div id="minutes"> <span class="label">MINUTES</span></div>
                <div id="seconds"> <span class="label">SECONDS</span></div>
            </section>
            <section class="period-container">
                <div id="period">AM</div>
            </section>
        </section>
    </main>
    <script src="index.js" defer></script>
</body>
</html>
