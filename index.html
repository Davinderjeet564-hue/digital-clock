<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <section class="title-container">
            <h1>Digital Clock</h1>
        </section>
        <time id="clock" datetime="00:00:00" aria-live="off">
            <div class="time-unit">
                <span class="time-value hourValue">00</span>
                <span class="label hourLabel">HOURS</span>
            </div>
            <div class="time-unit">
                <span class="time-value minuteValue">00</span>
                <span class="label minuteLabel">MINUTES</span>
            </div>
            <div class="time-unit">
                <span class="time-value secondValue">00</span>
                <span class="label secondLabel">SECONDS</span>
            </div>
        </time>
        <div class="ampm-container">
            <p class="ampm">AM</p>
        </div>
        <noscript>JavaScript is required to run this clock.</noscript>
    </main>
    <script src="index.js" defer></script>
</body>
</html>
