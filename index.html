<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <section class="title-container">
            <h1>Digital Clock</h1>
        </section>
        <section class="clock-container">
            <time id="hours" datetime="00:00:00"><span class="time-value hourValue">00</span><span class="label hourLabel">HOURS</span></time>
            <time id="minutes" datetime="00:00:00"><span class="time-value minuteValue">00</span><span class="label minuteLabel">MINUTES</span></time>
            <time id="seconds" datetime="00:00:00"><span class="time-value secondValue">00</span><span class="label secondLabel">SECONDS</span></time>
        </section>
        <section class="period-container">
            <div id="period">AM</div>
        </section>
    </main>
    <script src="index.js" defer></script>
</body>
</html>
