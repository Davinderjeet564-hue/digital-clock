<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <img src="Field-of-flowers.png" alt="Field of flowers background">
        <section class="clock-container">
            <div id="hours"><span class="time-value">00</span><span class="label">HOURS</span></div>
            <div id="minutes"><span class="time-value">00</span><span class="label">MINUTES</span></div>
            <div id="seconds"><span class="time-value">00</span><span class="label">SECONDS</span></div>
        </section>
        <section class="period-container">
            <div id="period">AM</div>
        </section>
    </main>
    <script src="index.js" defer></script>
</body>
</html>
